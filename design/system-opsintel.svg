<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" role="img"
     aria-label="Operational-intelligence pipeline — browser SDK sends events to an ingest pipeline, which writes to a columnar analytics store, feeding analyst dashboards."
     class="sys-diagram sd-ops" preserveAspectRatio="xMidYMid meet" focusable="false">
  <title>Operational-intelligence pipeline</title>
  <style>
    .sd-ops .sd-node       { fill: var(--color-surface, transparent); stroke: var(--color-border-strong, currentColor); stroke-width: 1.25; }
    .sd-ops .sd-node--emph { fill: var(--color-accent-soft, transparent); stroke: var(--color-accent, currentColor); stroke-width: 1.5; }
    .sd-ops .sd-title      { fill: currentColor; font-family: var(--font-mono, ui-monospace, SFMono-Regular, monospace); font-size: 15px; font-weight: 600; text-anchor: middle; letter-spacing: 0.02em; }
    .sd-ops .sd-cap        { fill: var(--color-text-muted, currentColor); font-family: var(--font-sans, system-ui, sans-serif); font-size: 11px; text-anchor: middle; }
    .sd-ops .sd-flow       { fill: none; stroke: var(--color-accent, currentColor); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 6 8; animation: sd-flow-ops 1.6s linear infinite; }
    .sd-ops .sd-arrow      { fill: var(--color-accent, currentColor); }
    @keyframes sd-flow-ops { to { stroke-dashoffset: -28; } }
    @media (prefers-reduced-motion: reduce) {
      .sd-ops .sd-flow { animation: none; stroke-dasharray: 0; }
    }
  </style>
  <defs>
    <marker id="sd-ops-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="sd-arrow"/>
    </marker>
  </defs>

  <!-- SDK -->
  <rect class="sd-node--emph" x="20"  y="60" width="150" height="80" rx="10"/>
  <text class="sd-title" x="95"  y="95">SDK</text>
  <text class="sd-cap"   x="95"  y="115">Two attributes.</text>
  <text class="sd-cap"   x="95"  y="128">Zero code changes.</text>

  <!-- flow 1 -->
  <line class="sd-flow" x1="170" y1="100" x2="216" y2="100" marker-end="url(#sd-ops-arrow)"/>

  <!-- Ingest -->
  <rect class="sd-node" x="220" y="60" width="150" height="80" rx="10"/>
  <text class="sd-title" x="295" y="95">Ingest</text>
  <text class="sd-cap"   x="295" y="115">Normalize. Enrich.</text>
  <text class="sd-cap"   x="295" y="128">Dedupe.</text>

  <!-- flow 2 -->
  <line class="sd-flow" x1="370" y1="100" x2="416" y2="100" marker-end="url(#sd-ops-arrow)"/>

  <!-- Store -->
  <rect class="sd-node" x="420" y="60" width="150" height="80" rx="10"/>
  <text class="sd-title" x="495" y="95">Store</text>
  <text class="sd-cap"   x="495" y="115">Columnar.</text>
  <text class="sd-cap"   x="495" y="128">Sub-second joins.</text>

  <!-- flow 3 -->
  <line class="sd-flow" x1="570" y1="100" x2="616" y2="100" marker-end="url(#sd-ops-arrow)"/>

  <!-- Dashboard -->
  <rect class="sd-node--emph" x="620" y="60" width="160" height="80" rx="10"/>
  <text class="sd-title" x="700" y="95">Dashboard</text>
  <text class="sd-cap"   x="700" y="115">Analyst approves.</text>
  <text class="sd-cap"   x="700" y="128">Taxonomy learns.</text>

  <!-- Caption strip -->
  <text class="sd-cap" x="400" y="185" style="font-size:12px;">
    Browser SDK &#8594; ingest pipeline &#8594; columnar analytics store &#8594; analyst dashboards
  </text>
</svg>
